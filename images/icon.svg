<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a9cb0"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.5)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.15)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Subtle inner shadow / highlight -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Git branch line (vertical spine) -->
  <line x1="42" y1="28" x2="42" y2="100" stroke="url(#line-grad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Branch curves connecting dots to the spine -->
  <!-- Green branch -->
  <path d="M42,40 C50,40 52,40 58,40" stroke="rgba(255,255,255,0.35)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Blue branch -->
  <path d="M42,62 C50,62 52,62 58,62" stroke="rgba(255,255,255,0.35)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Orange branch -->
  <path d="M42,84 C50,84 52,84 58,84" stroke="rgba(255,255,255,0.35)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Small node circles on the spine -->
  <circle cx="42" cy="40" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="42" cy="62" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="42" cy="84" r="3" fill="rgba(255,255,255,0.5)"/>

  <!-- Changelist dots (colored) -->
  <circle cx="64" cy="40" r="6" fill="#4ade80"/>
  <circle cx="64" cy="62" r="6" fill="#60a5fa"/>
  <circle cx="64" cy="84" r="6" fill="#fb923c"/>

  <!-- List lines (representing file names in each changelist) -->
  <!-- Green group -->
  <rect x="76" y="37" width="24" height="3" rx="1.5" fill="rgba(255,255,255,0.7)"/>
  <rect x="76" y="43" width="16" height="2.5" rx="1.25" fill="rgba(255,255,255,0.35)"/>

  <!-- Blue group -->
  <rect x="76" y="59" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.7)"/>
  <rect x="76" y="65" width="28" height="2.5" rx="1.25" fill="rgba(255,255,255,0.35)"/>

  <!-- Orange group -->
  <rect x="76" y="81" width="28" height="3" rx="1.5" fill="rgba(255,255,255,0.7)"/>
  <rect x="76" y="87" width="18" height="2.5" rx="1.25" fill="rgba(255,255,255,0.35)"/>
</svg>
