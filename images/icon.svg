  <!-- Balken -->
  <rect x="108" y="122" width="80" height="8" rx="4" fill="#3b82f6" opacity="0.8"/>
  <rect x="108" y="138" width="112" height="6" rx="3" fill="#3b82f6" opacity="0.35"/>

